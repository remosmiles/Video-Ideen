<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Vault Pro | Cloud Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --bg: #030712;
            --surface: #111827;
            --border: #1f2937;
            --text: #f9fafb;
            --text-muted: #9ca3af;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        .glass-header {
            text-align: center;
            padding: 3rem 0;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #fff 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .input-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 24px;
            display: flex;
            gap: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 3rem;
            backdrop-filter: blur(10px);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.1rem;
            outline: none;
            padding: 0.5rem;
        }

        .add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .add-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 0 30px var(--primary-glow);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .idea-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 20px;
            position: relative;
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease-out;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .idea-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        .idea-text {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            word-wrap: break-word;
        }

        .delete-btn {
            align-self: flex-end;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .delete-btn:hover { background: #ef4444; color: white; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .loader {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 1rem;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-header">
        <h1>VideoVault.</h1>
        <p style="color: var(--text-muted)">Deine Cloud-Zentrale für virale Konzepte</p>
    </div>

    <div class="input-card">
        <input type="text" id="ideaInput" placeholder="Was ist dein nächster Hit?">
        <button class="add-btn" onclick="addIdea()">Hinzufügen</button>
    </div>

    <div id="loader" class="loader">Verbindung zur Cloud wird hergestellt...</div>
    <div class="grid" id="ideaGrid"></div>
</div>

<script>
    // Deine Supabase Verbindungsdaten
    const SUPABASE_URL = 'https://nukaszowvngovgbdeycf.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_FucYC62e6dtviy5UnS9OoQ_OTg0QvGc';
    
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const ideaInput = document.getElementById('ideaInput');
    const ideaGrid = document.getElementById('ideaGrid');
    const loader = document.getElementById('loader');

    // Lade die Ideen beim Start
    loadIdeas();

    async function loadIdeas() {
        loader.textContent = "Synchronisiere mit der Cloud...";
        
        const { data, error } = await supabase
            .from('ideas')
            .select('*')
            .order('id', { ascending: false });

        if (error) {
            console.error("Datenbank-Fehler:", error);
            loader.textContent = "Fehler beim Laden. Hast du die Tabelle 'ideas' ohne RLS erstellt?";
            loader.style.color = "#ef4444";
        } else {
            if(data.length === 0) {
                loader.textContent = "Noch keine Ideen vorhanden. Leg los!";
            } else {
                loader.textContent = data.length + " Idee(n) sicher in der Cloud gespeichert.";
            }
            renderIdeas(data);
        }
    }

    function renderIdeas(ideas) {
        ideaGrid.innerHTML = '';
        ideas.forEach(idea => {
            const card = document.createElement('div');
            card.className = 'idea-card';
            card.innerHTML = `
                <div class="idea-text">${idea.text}</div>
                <button class="delete-btn" onclick="deleteIdea(${idea.id})">Löschen</button>
            `;
            ideaGrid.appendChild(card);
        });
    }

    async function addIdea() {
        const text = ideaInput.value.trim();
        if (!text) return;

        ideaInput.disabled = true; // Sperren während des Speicherns
        
        const { data, error } = await supabase
            .from('ideas')
            .insert([{ text: text }]);

        ideaInput.disabled = false;

        if (error) {
            alert("Fehler beim Speichern! Schau in die Browser-Konsole (F12) für Details.");
            console.error(error);
        } else {
            ideaInput.value = '';
            loadIdeas(); // Lade die Liste neu, um die neue Idee anzuzeigen
        }
    }

    async function deleteIdea(id) {
        const { error } = await supabase
            .from('ideas')
            .delete()
            .eq('id', id);

        if (error) {
            alert("Fehler beim Löschen!");
            console.error(error);
        } else {
            loadIdeas(); // Lade die Liste neu, um die gelöschte Idee zu entfernen
        }
    }

    // Enter-Taste zum Speichern nutzen
    ideaInput.addEventListener('keypress', (e) => { 
        if (e.key === 'Enter') addIdea(); 
    });
</script>

</body>
</html>
